version: '3.8'

services:
  # PostgreSQL database for Keycloak
  postgres:
    image: postgres:16-alpine
    container_name: uma-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uma-network

  # Keycloak - UMA authorization server
  keycloak:
    image: keycloak/keycloak:24.0.0
    container_name: uma-keycloak
    environment:
      # Database configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password

      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      # Hostname
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_ADMIN: localhost
      KC_HOSTNAME_ADMIN_PORT: 8080

      # HTTP configuration
      KC_HTTP_ENABLED: true
      KC_HTTP_PORT: 8080
      KC_PROXY: edge

      # Logging
      KC_LOG_LEVEL: INFO

      # JVM settings for better performance on development machine
      JAVA_OPTS: "-Xms512m -Xmx1024m"

    ports:
      - "8080:8080"

    command:
      - "start-dev"
      - "--import-realm"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

    networks:
      - uma-network

    # Keep container running even if healthcheck fails
    restart: unless-stopped

networks:
  uma-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
